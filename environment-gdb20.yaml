# Unified environment for the generative workflow and pipeline notebook.
name: gdb20
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.10
  - numpy=1.26.0
  - scipy

  # Pipeline notebook and gdb_ml helpers.
  - pandas=2.2.3
  - openpyxl
  - rdkit=2024.09.5
  - openbabel=3.1.1
  - pandarallel=1.6.5
  - jupyterlab=4.5.0
  - ipykernel=6.31.0

  # Generative-model runtime.
  # Keep PyTorch in conda so it shares conda-forge's OpenMP runtime.
  - pytorch=2.7.0
  - torchvision=0.22.0
  - torchaudio=2.7.0
  - tensorboard
  - h5py
  - protobuf

  - pip
  - pip:
      - tensorflow==2.20.0
      - deepsmiles==1.0.1
      - pyspark==3.5.5
      - tqdm==4.67.1
      - pillow==11.2.1
      - networkx==3.2.1
      - sympy==1.14.0
      - typing-extensions==4.13.2
      - filelock==3.18.0
      - jinja2==3.1.6
      - markupsafe==3.0.2
